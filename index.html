<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velle Store - Tiket & APK Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4">
    <header class="text-center py-6">
        <h1 class="text-3xl font-bold text-gray-800">Velle Store</h1>
        <p class="text-gray-600">Tiket & APK Premium Murah</p>
    </header>

    <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
        <!-- Produk akan muncul di sini via script -->
    </div>

    <script>
        const products = [
            { id: 'netflix', name: 'Netflix Premium', color: '#E50914', description: 'Nonton film & series sepuasnya, kualitas Ultra HD 4K.', variants: [{name: '1 Hari 1 User', price: 7500}, {name: '1 Bulan 2 User', price: 25000}] },
            { id: 'spotify', name: 'Spotify Premium', color: '#1DB954', description: 'Dengerin musik bebas iklan, download lagu offline.', variants: [{name: 'Famplan 1 Bulan', price: 17000}] },
            { id: 'canva', name: 'Canva Pro', color: '#00C4CC', description: 'Akses ratusan ribu template premium, hapus background.', variants: [{name: '1 Bulan', price: 2000}] }
            // Tambahkan item lain sesuai kebutuhan di sini
        ];

        const container = document.getElementById('product-container');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-2xl shadow-lg border-t-4";
            card.style.borderTopColor = p.color;
            card.innerHTML = `
                <h2 class="text-xl font-semibold mb-2">${p.name}</h2>
                <p class="text-sm text-gray-500 mb-4">${p.description}</p>
                <div class="space-y-2">
                    ${p.variants.map(v => `<div class="flex justify-between text-sm"><span>${v.name}</span><span class="font-bold">Rp${v.price}</span></div>`).join('')}
                </div>
                <button class="w-full mt-4 py-2 rounded-lg text-white font-semibold" style="background-color: ${p.color}">Pesan Sekarang</button>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
